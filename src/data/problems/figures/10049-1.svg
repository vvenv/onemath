<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 170" width="520" height="170"><rect x="30" y="40" width="120" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6"/><text x="90" y="70" font-size="14" text-anchor="middle" fill="#1e3a8a" font-weight="bold">10% 溶液</text><text x="90" y="92" font-size="12" text-anchor="middle" fill="#1e3a8a">x 克</text><rect x="190" y="40" width="120" height="70" rx="8" fill="#fee2e2" stroke="#ef4444"/><text x="250" y="70" font-size="14" text-anchor="middle" fill="#991b1b" font-weight="bold">40% 溶液</text><text x="250" y="92" font-size="12" text-anchor="middle" fill="#991b1b">x 克（等量）</text><text x="340" y="80" font-size="22" text-anchor="middle" fill="#374151">→</text><rect x="370" y="40" width="130" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b"/><text x="435" y="70" font-size="14" text-anchor="middle" fill="#78350f" font-weight="bold">25% 溶液</text><text x="435" y="92" font-size="12" text-anchor="middle" fill="#78350f">2x 克</text><text x="260" y="145" font-size="13" text-anchor="middle" fill="#374151">等质量混合 → 浓度 = (10% + 40%) ÷ 2 = 25%</text></svg>
