<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 440 280"
  width="400.00"
  height="160.00"
>
  <defs>
    <marker
      id="arrow"
      markerWidth="8"
      markerHeight="6"
      refX="8"
      refY="3"
      orient="auto"
    >
      <path d="M0,0 L8,3 L0,6 Z" class="fill-current" />
    </marker>
  </defs>
  <!-- 地点 A,
    B, C -->
  <circle cx="68.00" cy="140.00" r="20" class="fill-red-500" opacity="0.8" />
  <text
    x="68.00"
    y="144.80"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    A
  </text>
  <circle cx="220.00" cy="140.00" r="20" class="fill-blue-500" opacity="0.8" />
  <text
    x="220.00"
    y="144.80"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    B
  </text>
  <circle cx="372.00" cy="140.00" r="20" fill="#2ecc71" opacity="0.8" />
  <text
    x="372.00"
    y="144.80"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    C
  </text>
  <!-- A
    到 B 的 3 条路 -->
  <path
    d="M64,85 Q149,70 234,85"
    class="stroke-red-500 fill-none"
    marker-end="url(#arrow)"
  />
  <path
    d="M64,100 L234,100"
    class="stroke-red-500 fill-none"
    marker-end="url(#arrow)"
  />
  <path
    d="M64,115 Q149,130 234,115"
    class="stroke-red-500 fill-none"
    marker-end="url(#arrow)"
  />
  <!--
    B 到 C 的 4 条路 -->
  <path
    d="M274,85 Q359,70 444,85"
    class="stroke-blue-500 fill-none"
    marker-end="url(#arrow)"
  />
  <path
    d="M274,93 Q359,90 444,93"
    class="stroke-blue-500 fill-none"
    marker-end="url(#arrow)"
  />
  <path
    d="M274,107 Q359,110 444,107"
    class="stroke-blue-500 fill-none"
    marker-end="url(#arrow)"
  />
  <path
    d="M274,115 Q359,130 444,115"
    class="stroke-blue-500 fill-none"
    marker-end="url(#arrow)"
  />
  <!--
    A 直接到 C 的 2 条路 -->
  <path
    d="M64,160 Q234,180 444,160"
    stroke="#2ecc71"
    stroke-dasharray="8,4"
    marker-end="url(#arrow)"
    class="fill-none"
  />
  <path
    d="M64,175 Q234,195 444,175"
    stroke="#2ecc71"
    stroke-dasharray="8,4"
    marker-end="url(#arrow)"
    class="fill-none"
  />
  <!-- 标注 -->
  <text x="144.00" y="120.00" class="fill-red-500" text-anchor="middle">3条</text>
  <text x="296.00" y="120.00" class="fill-blue-500" text-anchor="middle">4条</text>
  <text x="220.00" y="192.00" fill="#2ecc71" text-anchor="middle">2条(直达)</text>
</svg>