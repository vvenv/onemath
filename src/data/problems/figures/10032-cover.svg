<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300"><defs><linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.3"/><stop offset="100%" style="stop-color:#e74c3c;stop-opacity:0.5"/></linearGradient><linearGradient id="frontFace" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#3498db;stop-opacity:0.2"/><stop offset="100%" style="stop-color:#3498db;stop-opacity:0.4"/></linearGradient><linearGradient id="sideFace" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#2ecc71;stop-opacity:0.2"/><stop offset="100%" style="stop-color:#2ecc71;stop-opacity:0.4"/></linearGradient></defs><!-- 长方体 5×4×3 等轴测投影 --><!-- 前面：宽5高3 --><polygon points="120,180 370,180 370,270 120,270" fill="url(#frontFace)" stroke="#2980b9"/><!-- 顶面：宽5深4 (斜投影) --><polygon points="120,180 370,180 420,130 170,130" fill="url(#topFace)" stroke="#c0392b"/><!-- 右侧面：深4高3 (斜投影) --><polygon points="370,180 420,130 420,220 370,270" fill="url(#sideFace)" stroke="#27ae60"/><!-- 网格线 - 前面 --><line x1="170" y1="180" x2="170" y2="270" stroke="#2980b9" opacity="0.5"/><line x1="220" y1="180" x2="220" y2="270" stroke="#2980b9" opacity="0.5"/><line x1="270" y1="180" x2="270" y2="270" stroke="#2980b9" opacity="0.5"/><line x1="320" y1="180" x2="320" y2="270" stroke="#2980b9" opacity="0.5"/><line x1="120" y1="210" x2="370" y2="210" stroke="#2980b9" opacity="0.5"/><line x1="120" y1="240" x2="370" y2="240" stroke="#2980b9" opacity="0.5"/><!-- 网格线 - 顶面 --><line x1="170" y1="180" x2="220" y2="130" stroke="#c0392b" opacity="0.5"/><line x1="220" y1="180" x2="270" y2="130" stroke="#c0392b" opacity="0.5"/><line x1="270" y1="180" x2="320" y2="130" stroke="#c0392b" opacity="0.5"/><line x1="320" y1="180" x2="370" y2="130" stroke="#c0392b" opacity="0.5"/><line x1="145" y1="155" x2="395" y2="155" stroke="#c0392b" opacity="0.5"/><line x1="120" y1="180" x2="170" y2="130" stroke="#c0392b" opacity="0.5"/><!-- 网格线 - 右侧面 --><line x1="370" y1="210" x2="420" y2="160" stroke="#27ae60" opacity="0.5"/><line x1="370" y1="240" x2="420" y2="190" stroke="#27ae60" opacity="0.5"/><!-- 尺寸标注 --><text x="245" y="295" font-size="14" fill="#2980b9" text-anchor="middle">长 = 5</text><text x="430" y="175" font-size="14" fill="#27ae60" text-anchor="start">宽 = 4</text><text x="105" y="225" font-size="14" fill="#c0392b" text-anchor="end">高 = 3</text><!-- 说明 --><text x="250" y="30" font-size="16" fill="#333" text-anchor="middle" font-weight="bold">5 × 4 × 3 长方体 (共60个小方块)</text><text x="250" y="55" font-size="13" fill="#666" text-anchor="middle">所有表面涂上红色后，沿接缝切开</text></svg>
