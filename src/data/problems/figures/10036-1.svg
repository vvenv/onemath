<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 400 260"
  width="400"
  height="260"
>
  <!-- 全集矩形 -->
  <rect
    x="30"
    y="30"
    width="340"
    height="210"
    class="stroke-current fill-none"
  />
  <text x="300" y="50" fill="currentColor" text-anchor="middle">全班45人</text>
  <!-- 数学集合（左圆） -->
  <circle
    cx="150"
    cy="130"
    r="70"
    class="fill-red-500 stroke-red-500"
    opacity="0.3"
  />
  <text
    x="120"
    y="90"
    class="fill-red-800"
    font-weight="bold"
    text-anchor="middle"
  >
    数学
  </text>
  <text x="120" y="108" class="fill-red-800" text-anchor="middle">28人</text>
  <!-- 语文集合（右圆） -->
  <circle
    cx="250"
    cy="130"
    r="70"
    class="fill-blue-500 stroke-blue-500"
    opacity="0.3"
  />
  <text x="260" y="90" fill="#2980b9" font-weight="bold" text-anchor="middle">
    语文
  </text>
  <text x="260" y="108" fill="#2980b9" text-anchor="middle">25人</text>
  <!-- 交集标注 -->
  <text x="200" y="130" fill="#8e44ad" font-weight="bold" text-anchor="middle">
    12人
  </text>
  <!-- 外部标注 -->
  <text x="200" y="220" text-anchor="middle" class="fill-green-600">
    都没有参加：？人
  </text>
</svg>
