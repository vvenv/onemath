<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 450 210"
  width="450"
  height="210"
>
  <text
    x="210"
    y="22"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    把两块长方形拼起来：宽都是 47
  </text>
  <rect x="40" y="45" width="126" height="90" fill="#dbeafe" stroke="#2563eb" />
  <text x="103" y="95" fill="#1d4ed8" text-anchor="middle" font-weight="bold">
    36 × 47
  </text>
  <rect
    x="166"
    y="45"
    width="224"
    height="90"
    fill="#fde68a"
    stroke="#d97706"
  />
  <text
    x="278"
    y="95"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    64 × 47
  </text>
  <line x1="40" y1="150" x2="390" y2="150" class="stroke-current" />
  <line x1="40" y1="145" x2="40" y2="155" class="stroke-current" />
  <line x1="390" y1="145" x2="390" y2="155" class="stroke-current" />
  <text x="215" y="168" fill="currentColor" text-anchor="middle">
    长 = 36 + 64 = 100
  </text>
  <line x1="400" y1="45" x2="400" y2="135" class="stroke-current" />
  <line x1="395" y1="45" x2="405" y2="45" class="stroke-current" />
  <line x1="395" y1="135" x2="405" y2="135" class="stroke-current" />
  <text x="410" y="94" fill="currentColor" text-anchor="middle">宽 47</text>
  <text x="210" y="198" fill="#059669" text-anchor="middle" font-weight="bold">
    合并面积 = (36 + 64) × 47 = 100 × 47
  </text>
</svg>
