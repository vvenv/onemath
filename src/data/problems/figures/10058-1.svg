<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 440 280"
  width="486.49"
  height="227.03"
>
  <text
    x="203.78"
    y="44.86"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    把两块长方形拼起来：宽都是 47
  </text>
  <rect x="20.00" y="69.73" width="136.22" height="97.30" fill="#dbeafe" stroke="#2563eb" />
  <text x="88.11" y="123.78" fill="#1d4ed8" text-anchor="middle" font-weight="bold">
    36 × 47
  </text>
  <rect
    x="156.22"
    y="69.73"
    width="242.16"
    height="97.30"
    fill="#fde68a"
    stroke="#d97706"
  />
  <text
    x="277.30"
    y="123.78"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    64 × 47
  </text>
  <line x1="20.00" y1="183.24" x2="398.38" y2="183.24" class="stroke-current" />
  <line x1="20.00" y1="177.84" x2="20.00" y2="188.65" class="stroke-current" />
  <line x1="398.38" y1="177.84" x2="398.38" y2="188.65" class="stroke-current" />
  <text x="209.19" y="202.70" fill="currentColor" text-anchor="middle">
    长 = 36 + 64 = 100
  </text>
  <line x1="409.19" y1="69.73" x2="409.19" y2="167.03" class="stroke-current" />
  <line x1="403.78" y1="69.73" x2="414.59" y2="69.73" class="stroke-current" />
  <line x1="403.78" y1="167.03" x2="414.59" y2="167.03" class="stroke-current" />
  <text x="420.00" y="122.70" fill="currentColor" text-anchor="middle">宽 47</text>
  <text x="203.78" y="235.14" fill="#059669" text-anchor="middle" font-weight="bold">
    合并面积 = (36 + 64) × 47 = 100 × 47
  </text>
</svg>
