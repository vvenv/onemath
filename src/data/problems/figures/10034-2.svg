<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 500 200"
  width="500"
  height="200"
>
  <defs>
    <marker
      id="arrow2"
      markerWidth="8"
      markerHeight="6"
      refX="8"
      refY="3"
      orient="auto"
    >
      <path d="M0,0 L8,3 L0,6 Z" class="fill-current" />
    </marker>
  </defs>
  <circle cx="60" cy="100" r="20" class="fill-red-500" opacity="0.8" />
  <text
    x="60"
    y="106"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    A
  </text>
  <circle cx="250" cy="100" r="20" class="fill-blue-500" opacity="0.8" />
  <text
    x="250"
    y="106"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    B
  </text>
  <circle cx="440" cy="100" r="20" opacity="0.5" class="fill-current" />
  <text
    x="440"
    y="106"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    C
  </text>
  <!--
    高亮 A→B→C 路线 -->
  <path
    d="M80,85 Q165,70 230,85"
    class="stroke-red-500 fill-none"
    marker-end="url(#arrow2)"
  />
  <path
    d="M80,100 L230,100"
    class="stroke-red-500 fill-none"
    marker-end="url(#arrow2)"
  />
  <path
    d="M80,115 Q165,130 230,115"
    class="stroke-red-500 fill-none"
    marker-end="url(#arrow2)"
  />
  <path
    d="M270,85 Q355,70 420,85"
    class="stroke-blue-500 fill-none"
    marker-end="url(#arrow2)"
  />
  <path
    d="M270,93 Q355,90 420,93"
    class="stroke-blue-500 fill-none"
    marker-end="url(#arrow2)"
  />
  <path
    d="M270,107 Q355,110 420,107"
    class="stroke-blue-500 fill-none"
    marker-end="url(#arrow2)"
  />
  <path
    d="M270,115 Q355,130 420,115"
    class="stroke-blue-500 fill-none"
    marker-end="url(#arrow2)"
  />
  <text
    x="155"
    y="65"
    class="fill-red-500"
    text-anchor="middle"
    font-weight="bold"
  >
    3 种
  </text>
  <text
    x="345"
    y="65"
    class="fill-blue-500"
    text-anchor="middle"
    font-weight="bold"
  >
    4 种
  </text>
  <text x="250" y="50" fill="currentColor" text-anchor="middle">
    第一类：经过B
  </text>
  <text x="250" y="165" class="fill-red-500" text-anchor="middle">
    3 × 4 = 12 种
  </text>
</svg>
