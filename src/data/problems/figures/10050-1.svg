<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 400 240"
  width="400"
  height="240"
>
  <text
    x="200"
    y="24"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    十字交叉求比例
  </text>
  <!--
    对角线交叉 -->
  <line x1="120" y1="70" x2="280" y2="170" class="stroke-current" />
  <line x1="120" y1="170" x2="280" y2="70" class="stroke-current" />
  <!-- 中心目标浓度 -->
  <text x="200" y="145" fill="currentColor" text-anchor="middle">15%</text>
  <!-- 左侧：原浓度 -->
  <text x="110" y="75" fill="#2980b9" text-anchor="end">5%</text>
  <text x="110" y="175" class="fill-red-500" text-anchor="end">20%</text>
  <!-- 右侧：对角线得到的份数 -->
  <text x="290" y="75" class="fill-green-600" text-anchor="start">
    20-15 = 5
  </text>
  <text x="290" y="175" class="fill-green-600" text-anchor="start">
    15-5 = 10
  </text>
  <!-- 结论 -->
  <text x="200" y="210" fill="currentColor" text-anchor="middle">
    5% : 20% = 5 : 10 = 1 : 2
  </text>
</svg>
