<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 440 280"
  width="400.00"
  height="240.00"
>
  <text
    x="220.00"
    y="44.00"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    十字交叉求比例
  </text>
  <!--
    对角线交叉 -->
  <line x1="140.00" y1="90.00" x2="300.00" y2="190.00" class="stroke-current" />
  <line x1="140.00" y1="190.00" x2="300.00" y2="90.00" class="stroke-current" />
  <!-- 中心目标浓度 -->
  <text x="220.00" y="165.00" fill="currentColor" text-anchor="middle">15%</text>
  <!-- 左侧：原浓度 -->
  <text x="130.00" y="95.00" fill="#2980b9" text-anchor="end">5%</text>
  <text x="130.00" y="195.00" class="fill-red-500" text-anchor="end">20%</text>
  <!-- 右侧：对角线得到的份数 -->
  <text x="310.00" y="95.00" class="fill-green-600" text-anchor="start">
    20-15 = 5
  </text>
  <text x="310.00" y="195.00" class="fill-green-600" text-anchor="start">
    15-5 = 10
  </text>
  <!-- 结论 -->
  <text x="220.00" y="230.00" fill="currentColor" text-anchor="middle">
    5% : 20% = 5 : 10 = 1 : 2
  </text>
</svg>
