<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 400 200"
  width="400"
  height="200"
>
  <text
    x="200"
    y="30"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    验证：24 和 18 的短除法
  </text>
  <!-- 短除式 -->
  <text x="100" y="60" fill="currentColor" text-anchor="middle">2 | 24 18</text>
  <text x="100" y="85" fill="currentColor" text-anchor="middle">3 | 12 9</text>
  <text x="100" y="110" fill="currentColor" text-anchor="middle">4 3</text>
  <text x="250" y="70" fill="currentColor" text-anchor="middle">
    最大公约数 = 2 × 3 = 6 ✓
  </text>
  <text x="250" y="95" fill="currentColor" text-anchor="middle">
    最小公倍数 = 2 × 3 × 4 × 3 = 72 ✓
  </text>
  <text
    x="200"
    y="160"
    class="fill-green-600"
    text-anchor="middle"
    font-weight="bold"
  >
    ✅ 乙数 = 18
  </text>
</svg>
