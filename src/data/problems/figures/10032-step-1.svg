<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" width="500" height="320"><!-- 长方体框架 --><polygon points="120,190 370,190 420,140 170,140" fill="none" stroke="#ccc" stroke-dasharray="4,4"/><polygon points="120,190 370,190 370,280 120,280" fill="none" stroke="#ccc" stroke-dasharray="4,4"/><polygon points="370,190 420,140 420,230 370,280" fill="none" stroke="#ccc" stroke-dasharray="4,4"/><!-- 顶点标记 (三面涂色) --><circle cx="120" cy="190" r="5" fill="#f39c12" stroke="#e67e22"/><circle cx="370" cy="190" r="5" fill="#f39c12" stroke="#e67e22"/><circle cx="170" cy="140" r="5" fill="#f39c12" stroke="#e67e22"/><circle cx="420" cy="140" r="5" fill="#f39c12" stroke="#e67e22"/><circle cx="120" cy="280" r="5" fill="#f39c12" stroke="#e67e22"/><circle cx="370" cy="280" r="5" fill="#f39c12" stroke="#e67e22"/><circle cx="170" cy="90" r="5" fill="#f39c12" stroke="#e67e22"/><circle cx="420" cy="230" r="5" fill="#f39c12" stroke="#e67e22"/><!-- 高亮长棱上的两面涂色方块 --><line x1="120" y1="190" x2="370" y2="190" stroke="#e74c3c" stroke-width="6" stroke-linecap="round" opacity="0.7"/><!-- 标注 --><text x="245" y="175" font-size="12" fill="#e74c3c" text-anchor="middle">长棱：共4条</text><text x="245" y="310" font-size="13" fill="#333" text-anchor="middle">每条长棱：5 - 2 = 3 个 (去掉两端黄点)</text><!-- 图例 --><rect x="30" y="20" width="12" height="12" fill="#f39c12" rx="2"/><text x="48" y="31" font-size="11" fill="#333">三面涂色（顶点）</text><rect x="30" y="40" width="12" height="12" fill="#e74c3c" rx="2" opacity="0.7"/><text x="48" y="51" font-size="11" fill="#333">两面涂色（棱中）</text></svg>
