<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 500 200"
  width="500"
  height="200"
>
  <text
    x="250"
    y="25"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    逆向推导示意图
  </text>
  <!--
    时间轴 -->
  <line x1="50" y1="80" x2="450" y2="80" class="stroke-current" />
  <circle cx="100" cy="80" r="15" fill="#2980b9" />
  <text x="100" y="85" fill="currentColor" text-anchor="middle">初始</text>
  <circle cx="220" cy="80" r="15" class="fill-orange-600" />
  <text x="220" y="85" fill="currentColor" text-anchor="middle">第1次</text>
  <circle cx="340" cy="80" r="15" class="fill-red-500" />
  <text x="340" y="85" fill="currentColor" text-anchor="middle">第2次</text>
  <text x="100" y="120" fill="currentColor" text-anchor="middle">
    V 升, 80%
  </text>
  <text x="220" y="120" fill="currentColor" text-anchor="middle">
    倒20升加水
  </text>
  <text x="340" y="120" fill="currentColor" text-anchor="middle">
    倒30升加水
  </text>
  <text x="250" y="160" class="fill-green-600" text-anchor="middle">
    方程：(V-20)(V-30) / V² = 0.5
  </text>
  <text x="250" y="185" fill="currentColor" text-anchor="middle">
    解得 V ≈ 86.06 升
  </text>
</svg>
