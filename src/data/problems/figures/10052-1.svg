<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 440 280"
  width="500.00"
  height="200.00"
>
  <text
    x="220.00"
    y="60.00"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    逆向推导示意图
  </text>
  <!--
    时间轴 -->
  <line x1="20.00" y1="115.00" x2="420.00" y2="115.00" class="stroke-current" />
  <circle cx="70.00" cy="115.00" r="15" fill="#2980b9" />
  <text x="70.00" y="120.00" fill="currentColor" text-anchor="middle">初始</text>
  <circle cx="190.00" cy="115.00" r="15" class="fill-orange-600" />
  <text x="190.00" y="120.00" fill="currentColor" text-anchor="middle">第1次</text>
  <circle cx="310.00" cy="115.00" r="15" class="fill-red-500" />
  <text x="310.00" y="120.00" fill="currentColor" text-anchor="middle">第2次</text>
  <text x="70.00" y="155.00" fill="currentColor" text-anchor="middle">
    V 升, 80%
  </text>
  <text x="190.00" y="155.00" fill="currentColor" text-anchor="middle">
    倒20升加水
  </text>
  <text x="310.00" y="155.00" fill="currentColor" text-anchor="middle">
    倒30升加水
  </text>
  <text x="220.00" y="195.00" class="fill-green-600" text-anchor="middle">
    方程：(V-20)(V-30) / V² = 0.5
  </text>
  <text x="220.00" y="220.00" fill="currentColor" text-anchor="middle">
    解得 V ≈ 86.06 升
  </text>
</svg>
