<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 400 150"
  width="400"
  height="150"
>
  <text
    x="200"
    y="30"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    翻转过程示例（3次操作）
  </text>
  <!-- 初始 -->
  <text x="60" y="60" fill="currentColor" text-anchor="middle">初始</text>
  <circle cx="40" cy="80" r="12" class="stroke-blue-500 fill-none" />
  <circle cx="60" cy="80" r="12" class="stroke-blue-500 fill-none" />
  <circle cx="80" cy="80" r="12" class="stroke-blue-500 fill-none" />
  <text x="40" y="84" class="fill-blue-500" text-anchor="middle">↑</text>
  <text x="60" y="84" class="fill-blue-500" text-anchor="middle">↑</text>
  <text x="80" y="84" class="fill-blue-500" text-anchor="middle">↑</text>
  <text x="130" y="70" fill="currentColor" text-anchor="middle">→</text>
  <!-- 第1次 -->
  <text x="180" y="60" fill="currentColor" text-anchor="middle">第1次</text>
  <circle cx="160" cy="80" r="12" class="fill-red-500 stroke-red-500" />
  <circle cx="180" cy="80" r="12" class="fill-red-500 stroke-red-500" />
  <circle cx="200" cy="80" r="12" class="fill-red-500 stroke-red-500" />
  <text x="160" y="84" fill="currentColor" text-anchor="middle">↓</text>
  <text x="180" y="84" fill="currentColor" text-anchor="middle">↓</text>
  <text x="200" y="84" fill="currentColor" text-anchor="middle">↓</text>
  <text x="250" y="70" fill="currentColor" text-anchor="middle">→</text>
  <!-- 最终 -->
  <text x="330" y="60" fill="currentColor" text-anchor="middle">最终</text>
  <circle cx="300" cy="80" r="12" class="fill-red-500 stroke-red-500" />
  <circle cx="320" cy="80" r="12" class="fill-red-500 stroke-red-500" />
  <circle cx="340" cy="80" r="12" class="fill-red-500 stroke-red-500" />
  <circle cx="360" cy="80" r="12" class="fill-red-500 stroke-red-500" />
  <circle cx="380" cy="80" r="12" class="fill-red-500 stroke-red-500" />
  <text x="300" y="84" fill="currentColor" text-anchor="middle">↓</text>
  <text x="320" y="84" fill="currentColor" text-anchor="middle">↓</text>
  <text x="340" y="84" fill="currentColor" text-anchor="middle">↓</text>
  <text x="360" y="84" fill="currentColor" text-anchor="middle">↓</text>
  <text x="380" y="84" fill="currentColor" text-anchor="middle">↓</text>
  <text x="200" y="130" class="fill-green-600" text-anchor="middle">
    ✅ 可以实现：经过奇数次操作后，所有杯子杯口朝下
  </text>
</svg>
