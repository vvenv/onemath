<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 440 280"
>
  <text
    x="208.24"
    y="81.18"
    fill="currentColor"
    text-anchor="middle"
    font-weight="bold"
  >
    翻转过程示例（3次操作）
  </text>
  <!-- 初始 -->
  <text x="43.53" y="116.47" fill="currentColor" text-anchor="middle">初始</text>
  <circle cx="20" cy="140" r="12" class="stroke-primary fill-none" />
  <circle cx="43.53" cy="140" r="12" class="stroke-primary fill-none" />
  <circle cx="67.06" cy="140" r="12" class="stroke-primary fill-none" />
  <text x="20" y="144.71" class="fill-primary" text-anchor="middle">↑</text>
  <text x="43.53" y="144.71" class="fill-primary" text-anchor="middle">↑</text>
  <text x="67.06" y="144.71" class="fill-primary" text-anchor="middle">↑</text>
  <text x="125.88" y="128.24" fill="currentColor" text-anchor="middle">→</text>
  <!-- 第1次 -->
  <text x="184.71" y="116.47" fill="currentColor" text-anchor="middle">第1次</text>
  <circle cx="161.18" cy="140" r="12" class="fill-primary stroke-primary" />
  <circle cx="184.71" cy="140" r="12" class="fill-primary stroke-primary" />
  <circle cx="208.24" cy="140" r="12" class="fill-primary stroke-primary" />
  <text x="161.18" y="144.71" fill="currentColor" text-anchor="middle">↓</text>
  <text x="184.71" y="144.71" fill="currentColor" text-anchor="middle">↓</text>
  <text x="208.24" y="144.71" fill="currentColor" text-anchor="middle">↓</text>
  <text x="267.06" y="128.24" fill="currentColor" text-anchor="middle">→</text>
  <!-- 最终 -->
  <text x="361.18" y="116.47" fill="currentColor" text-anchor="middle">最终</text>
  <circle cx="325.88" cy="140" r="12" class="fill-primary stroke-primary" />
  <circle cx="349.41" cy="140" r="12" class="fill-primary stroke-primary" />
  <circle cx="372.94" cy="140" r="12" class="fill-primary stroke-primary" />
  <circle cx="396.47" cy="140" r="12" class="fill-primary stroke-primary" />
  <circle cx="420" cy="140" r="12" class="fill-primary stroke-primary" />
  <text x="325.88" y="144.71" fill="currentColor" text-anchor="middle">↓</text>
  <text x="349.41" y="144.71" fill="currentColor" text-anchor="middle">↓</text>
  <text x="372.94" y="144.71" fill="currentColor" text-anchor="middle">↓</text>
  <text x="396.47" y="144.71" fill="currentColor" text-anchor="middle">↓</text>
  <text x="420" y="144.71" fill="currentColor" text-anchor="middle">↓</text>
  <text x="208.24" y="198.82" class="fill-primary" text-anchor="middle">
    ✅ 可以实现：经过奇数次操作后，所有杯子杯口朝下
  </text>
</svg>
