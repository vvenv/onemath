<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 110">
  <g>
    <rect
      x="30"
      y="30"
      width="100"
      height="50"
      fill-opacity="0.12"
      class="stroke-current fill-current"
    />
    <text x="55" y="60" fill="currentColor" text-anchor="middle">百位</text>
    <rect
      x="150"
      y="30"
      width="100"
      height="50"
      fill-opacity="0.12"
      class="stroke-current fill-current"
    />
    <text x="180" y="60" fill="currentColor" text-anchor="middle">十位</text>
    <rect
      x="270"
      y="30"
      width="100"
      height="50"
      class="fill-orange-100 stroke-orange-600"
      stroke-dasharray="4 3"
    />
    <text x="295" y="60" class="fill-yellow-700" text-anchor="middle">
      个位
    </text>
    <text x="30" y="100" class="fill-red-800" text-anchor="middle">
      不能填 0
    </text>
    <text x="270" y="100" class="fill-yellow-700" text-anchor="middle">
      必须填 1/3/5
    </text>
  </g>
</svg>
