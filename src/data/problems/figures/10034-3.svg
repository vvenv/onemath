<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200"><defs><marker id="arrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2ecc71"/></marker></defs><circle cx="60" cy="100" r="20" fill="#2ecc71" opacity="0.8"/><text x="60" y="106" font-size="16" fill="currentColor" text-anchor="middle" font-weight="bold">A</text><circle cx="250" cy="100" r="20" fill="currentColor" opacity="0.3"/><text x="250" y="106" font-size="16" fill="currentColor" text-anchor="middle" font-weight="bold">B</text><circle cx="440" cy="100" r="20" fill="#2ecc71" opacity="0.8"/><text x="440" y="106" font-size="16" fill="currentColor" text-anchor="middle" font-weight="bold">C</text><!-- 高亮直达路线 --><path d="M80,160 Q250,180 420,160" fill="none" stroke="#2ecc71" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrow3)"/><path d="M80,175 Q250,195 420,175" fill="none" stroke="#2ecc71" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrow3)"/><text x="250" y="150" font-size="14" fill="#2ecc71" text-anchor="middle" font-weight="bold">2 种</text><text x="250" y="50" font-size="13" fill="currentColor" text-anchor="middle">第二类：直达（不经过B）</text><text x="250" y="135" font-size="13" fill="#2ecc71" text-anchor="middle">共 2 种</text></svg>
