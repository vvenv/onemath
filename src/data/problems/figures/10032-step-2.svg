<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" width="500" height="320"><!-- 长方体框架 --><polygon points="120,190 370,190 420,140 170,140" fill="none" stroke="#ccc" stroke-dasharray="4,4"/><polygon points="120,190 370,190 370,280 120,280" fill="none" stroke="#ccc" stroke-dasharray="4,4"/><polygon points="370,190 420,140 420,230 370,280" fill="none" stroke="#ccc" stroke-dasharray="4,4"/><!-- 顶点 --><circle cx="120" cy="190" r="4" fill="#f39c12" opacity="0.5"/><circle cx="370" cy="190" r="4" fill="#f39c12" opacity="0.5"/><circle cx="170" cy="140" r="4" fill="#f39c12" opacity="0.5"/><circle cx="420" cy="140" r="4" fill="#f39c12" opacity="0.5"/><circle cx="120" cy="280" r="4" fill="#f39c12" opacity="0.5"/><circle cx="370" cy="280" r="4" fill="#f39c12" opacity="0.5"/><!-- 高亮中棱 --><line x1="170" y1="140" x2="420" y2="140" stroke="#3498db" stroke-width="6" stroke-linecap="round" opacity="0.7"/><line x1="120" y1="280" x2="370" y2="280" stroke="#3498db" stroke-width="6" stroke-linecap="round" opacity="0.7"/><text x="295" y="125" font-size="12" fill="#3498db" text-anchor="middle">中棱：共4条</text><text x="245" y="310" font-size="13" fill="#333" text-anchor="middle">每条中棱：4 - 2 = 2 个，4条共 4 × 2 = 8 个</text></svg>
