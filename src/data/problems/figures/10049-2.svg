<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200"><text x="240" y="28" font-size="14" text-anchor="middle" fill="currentColor" font-weight="bold">十字交叉法</text><text x="120" y="70" font-size="14" text-anchor="middle" fill="#b45309">25%</text><text x="120" y="150" font-size="14" text-anchor="middle" fill="#1e40af">20%</text><text x="240" y="115" font-size="16" text-anchor="middle" fill="currentColor" font-weight="bold">22%</text><line x1="150" y1="75" x2="220" y2="105" stroke="#9ca3af"/><line x1="150" y1="145" x2="220" y2="115" stroke="#9ca3af"/><line x1="260" y1="105" x2="330" y2="75" stroke="#9ca3af"/><line x1="260" y1="115" x2="330" y2="145" stroke="#9ca3af"/><text x="380" y="70" font-size="14" text-anchor="middle" fill="#b45309">22 − 20 = 2</text><text x="380" y="150" font-size="14" text-anchor="middle" fill="#1e40af">25 − 22 = 3</text><text x="240" y="185" font-size="13" text-anchor="middle" fill="#374151">所以 25% : 20% 的质量比 = 2 : 3</text></svg>
